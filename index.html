<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#e57b84" />
    <title>ChefMate - Bitácora de Recetas</title>
    <script>
      // Aplicar tema oscuro antes del renderizado para evitar flash
      (function () {
        try {
          const savedDarkMode = localStorage.getItem("chefmate-dark-mode");
          if (savedDarkMode === "true") {
            document.documentElement.classList.add("dark");
          } else if (
            savedDarkMode === null &&
            window.matchMedia("(prefers-color-scheme: dark)").matches
          ) {
            document.documentElement.classList.add("dark");
          }
        } catch (e) {
          // Ignorar errores si localStorage no está disponible
        }
      })();
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
